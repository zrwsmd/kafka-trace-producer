# ============================================================
# Kafka Trace Producer 配置文件
# ============================================================

# ---- Kafka 连接 ----
# 云服务器的公网IP:9092 (Kafka Broker 地址)
kafka.bootstrap.servers=47.129.128.147:9092
kafka.topic=trace-data

# ---- 零丢失配置 ----
kafka.acks=all
kafka.retries=5
kafka.enable.idempotence=true

# ---- Trace 数据参数 ----
# 采集周期 (毫秒)
trace.period.ms=1
# 每包帧数
trace.batch.size=100
# 总帧数 (1000万)
trace.max.frames=10000
# 包间隔 (毫秒)，50ms = 每秒20包 = 2000帧/秒，1000万帧约83分钟
# 减小此值可加快发送速度 (0=全速)
trace.send.interval.ms=50
# 任务ID
trace.task.id=trace_001
